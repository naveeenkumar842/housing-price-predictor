# render.yaml
services:
  - type: web
    name: housing-api
    runtime: docker
    repo: https://github.com/naveeenkumar842/housing-price-predictor
    plan: free
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: ENVIRONMENT
        value: production
    healthCheckPath: /health
    autoDeploy: true

# render.yaml
services:
  - type: web
    name: frontend
    runtime: static
    repo: https://github.com/naveeenkumar842/housing-price-predictor
    plan: free
    buildCommand: |
      cd frontend
      npm install
      npm run build
    publishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://housing-api.onrender.com