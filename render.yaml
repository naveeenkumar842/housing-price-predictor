# render.yaml
services:
  # Backend Service
  - type: web
    name: housing-backend
    runtime: docker
    repo: https://github.com/naveeenkumar842/housing-price-predictor
    plan: free
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CORS_ORIGINS
        value: https://housing-frontend.onrender.com
    healthCheckPath: /health
    autoDeploy: true
    numInstances: 1

  # Frontend Service
  - type: web
    name: housing-frontend
    runtime: docker
    repo: https://github.com/naveeenkumar842/housing-price-predictor
    plan: free
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    envVars:
      - key: REACT_APP_API_URL
        value: https://housing-backend.onrender.com
    healthCheckPath: /
    autoDeploy: true
    numInstances: 1