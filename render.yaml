services:
  - type: web
    name: housing-price-predictor
    runtime: docker
    repo: https://github.com/naveeenkumar842/housing-price-predictor
    plan: free
    dockerComposePath: docker-compose.yml
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: REACT_APP_API_URL
        value: https://housing-price-backend.onrender.com
    healthCheckPath: /health
    autoDeploy: true