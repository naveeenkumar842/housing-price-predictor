services:
  # Backend API Service
  - type: web
    name: housing-price-backend
    runtime: docker
    repo: https://github.com/naveeenkumar842/housing-price-predictor
    plan: free
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health
    autoDeploy: true
    numInstances: 1