services:
  # Backend API Service
  - type: web
    name: housing-api
    runtime: docker
    repo: https://github.com/naveeenkumar842/housing-price-predictor
    plan: free
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /health
    autoDeploy: true
    numInstances: 1

  # Frontend Web Service
  - type: web
    name: housing-frontend
    runtime: static
    repo: https://github.com/naveeenkumar842/housing-price-predictor
    plan: free
    buildCommand: |
      cd frontend
      npm install
      npm run build
    publishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://housing-api.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /api/*
        destination: https://housing-api.onrender.com/$1